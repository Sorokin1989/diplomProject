<div th:fragment="admin-users-list-content" class="categories-card" xmlns:th="http://www.thymeleaf.org">
    <div class="brand">
        <h1>Школа красоты</h1>
        <p>учебный центр индустрии красоты</p>
    </div>

    <div class="form-header">
        <!-- Исправлено: flash-атрибуты теперь из модели, а не из параметров URL -->
        <div th:if="${success}" class="message-box success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${success}">Успешно</span>
        </div>
        <div th:if="${error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${error}">Ошибка</span>
        </div>
        <h2>Управление пользователями</h2>
        <p>Просмотр и редактирование профилей</p>
    </div>

    <!-- Админ-бар с кнопкой "Назад" (опционально) -->
    <div style="display: flex; justify-content: flex-start; margin-bottom: 1.5rem;">
        <a th:href="@{/admin}" class="btn-secondary">
            <i class="fas fa-arrow-left"></i> Назад
        </a>
    </div>

    <!-- Таблица пользователей -->
    <div class="users-table-container" style="overflow-x: auto;">
        <table class="users-table" style="width: 100%; border-collapse: collapse;">
            <thead>
            <tr style="background: #f8f6f9; text-align: left;">
                <th style="padding: 0.75rem;">ID</th>
                <th style="padding: 0.75rem;">Имя пользователя</th>
                <th style="padding: 0.75rem;">Email</th>
                <th style="padding: 0.75rem;">Роль</th>
                <th style="padding: 0.75rem;">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}" style="border-bottom: 1px solid #f0e6eb;">
                <td style="padding: 0.75rem;" th:text="${user.id}">1</td>
                <td style="padding: 0.75rem;" th:text="${user.username}">username</td>
                <td style="padding: 0.75rem;" th:text="${user.email}">email@example.com</td>
                <td style="padding: 0.75rem;">
                    <span th:text="${user.role}" style="background: #f0eef8; padding: 0.25rem 0.5rem; border-radius: 1rem; font-size: 0.8rem;"></span>
                </td>
                <td style="padding: 0.75rem;">
                    <div class="admin-actions" style="margin-top: 0; gap: 0.5rem;">
                        <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="edit-btn-small">
                            <i class="fas fa-edit"></i> Редактировать
                        </a>
                        <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" style="display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="delete-btn-small" onclick="return confirm('Удалить пользователя?')">
                                <i class="fas fa-trash-alt"></i> Удалить
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${users.empty}">
                <td colspan="5" style="text-align: center; padding: 2rem;">Пользователи не найдены</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Пагинация -->
    <div th:if="${totalPages > 1}" class="pagination" style="text-align: center; margin-top: 2rem;">
        <span th:each="i : ${#numbers.sequence(1, totalPages)}">
            <a th:href="@{/admin/users(page=${i-1})}" th:text="${i}"
               th:classappend="${i == currentPage} ? 'current-page' : ''"
               style="display: inline-block; padding: 0.5rem 0.75rem; margin: 0 0.25rem; border-radius: 0.5rem; background: ${i == currentPage} ? '#8461c2' : '#f0eef8'; color: ${i == currentPage} ? 'white' : '#8461c2'; text-decoration: none;">
            </a>
        </span>
    </div>

    <hr>
    <div class="home-link">
        <a th:href="@{/admin}">Вернуться в админ-панель</a>
    </div>
</div>
