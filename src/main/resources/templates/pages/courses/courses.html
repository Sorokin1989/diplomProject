<div th:fragment="user-courses-content" class="courses-container">
    <!-- Блок для flash-сообщений -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="courses-header">
        <h2>Наши курсы</h2>
        <p th:if="${category != null}" th:text="'Категория: ' + ${category.title}"></p>
        <p th:unless="${category != null}">Выберите курс для обучения</p>
    </div>
    <div class="home-link">
        <a th:href="@{/categories}">Все категории</a>
    </div>
    <hr>

    <div class="courses-grid">
        <div th:each="course : ${courses}" class="course-card">
            <a th:href="@{/courses/{id}(id=${course.id})}" class="course-link">
                <div class="course-image">
                    <img th:if="${course.imageUrl != null}" th:src="@{${course.imageUrl}}" alt="course image">
                    <i th:unless="${course.imageUrl != null}" class="fas fa-graduation-cap"></i>
                </div>
                <div class="course-info">
                    <h3 th:text="${course.title}">Название курса</h3>
                    <p th:text="${course.description != null ? course.description : 'Описание курса'}">Описание</p>
                </div>
            </a>
            <div class="course-footer">
                <div class="course-price" th:text="${course.price != null ? course.price + ' ₽' : 'Цена не указана'}">0 ₽</div>
                <form th:action="@{/cart/add/{id}(id=${course.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button th:if="${not isAdmin}" type="submit" class="btn-add-to-cart">
                        <i class="fas fa-shopping-cart"></i> В корзину
                    </button>
                </form>
            </div>
        </div>

        <div th:if="${courses == null or courses.isEmpty()}" class="empty-courses">
            <i class="fas fa-folder-open"></i>
            <p>Курсы не найдены</p>
        </div>
    </div>
</div>
