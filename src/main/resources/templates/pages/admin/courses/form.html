<div th:fragment="course-form" class="categories-card" xmlns:th="http://www.thymeleaf.org">
    <div class="brand">
        <h1>Школа красоты</h1>
        <p>учебный центр индустрии красоты</p>
    </div>

    <div class="form-header">
        <div th:if="${param.error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${param.error}">Ошибка</span>
        </div>
        <div th:if="${param.success}" class="message-box success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${param.success}">Успешно</span>
        </div>
        <h2 th:text="${course.id != null ? 'Редактирование курса' : 'Создание курса'}">Форма курса</h2>
        <p>Заполните данные курса</p>
    </div>

    <form th:action="@{${course.id != null ? '/admin/courses/' + course.id : '/admin/courses'}}"
          method="post" th:object="${course}" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="input-group">
            <label for="title">Название курса *</label>
            <div class="input-field">
                <i class="fas fa-book"></i>
                <input type="text" id="title" th:field="*{title}" placeholder="Например: Маникюр для начинающих" required>
            </div>
        </div>

        <div class="input-group">
            <label for="title">Автор *</label>
            <div class="input-field">
                <i class="fas fa-book"></i>
                <input type="text" id="author" th:field="*{author}" placeholder="Например: Васильева А.Н." required>
            </div>
        </div>

        <div class="input-group">
            <label for="description">Описание</label>
            <div class="input-field">
                <i class="fas fa-align-left"></i>
                <textarea id="description" th:field="*{description}" rows="4"
                          placeholder="Подробное описание курса"></textarea>
            </div>
        </div>

        <div class="input-group">
            <label for="price">Цена (руб.) *</label>
            <div class="input-field">
                <i class="fas fa-ruble-sign"></i>
                <input type="number" id="price" th:field="*{price}" step="0.01" required>
            </div>
        </div>

        <!-- Выбор категории -->
        <div class="input-group">
            <label>Категория *</label>
            <div class="input-field">
                <i class="fas fa-tag"></i>
                <select name="categoryId" required>
                    <option value="">-- Выберите категорию --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.title}"
                            th:selected="${course.category != null && course.category.id == cat.id}"></option>
                </select>
            </div>
        </div>

        <!-- Поле для загрузки новых изображений (можно несколько) -->
        <div class="input-group">
            <label for="newImages">Добавить новые изображения</label>
            <div class="input-field">
                <i class="fas fa-image"></i>
                <input type="file" id="newImages" name="newImages" accept="image/*" multiple>
            </div>
            <small class="image-hint">Вы можете выбрать несколько файлов (jpg, png, gif).</small>
        </div>

        <button type="submit" class="save-btn">
            <i class="fas fa-save"></i> Сохранить курс
        </button>
    </form>
    <!-- ДОБАВИТЬ ЭТОТ БЛОК (только для редактирования) -->
    <div th:if="${course.id != null}" style="margin-top: 1rem; text-align: center;">
        <a th:href="@{/admin/courses/{id}/materials(id=${course.id})}" class="btn-secondary">
            <i class="fas fa-file-archive"></i> Управление материалами курса
        </a>
    </div>
    <!-- Блок существующих изображений (только при редактировании) -->
    <div th:if="${course.id != null and not #lists.isEmpty(course.images)}" class="input-group">
        <label>Изображения курса</label>
        <div class="existing-images" style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem;">
            <div th:each="img : ${course.images}" class="image-item" style="position: relative; width: 100px;">
                <img th:src="${img.filePath}" style="width: 100%; height: 100px; object-fit: cover; border-radius: 8px;">
                <span th:if="${img.main}" style="position: absolute; top: 0; right: 0; background: gold; color: black; font-size: 10px; padding: 2px 5px; border-radius: 4px;">Главное</span>
                <div class="image-actions" style="margin-top: 5px; display: flex; gap: 5px; justify-content: center;">
                    <form th:action="@{/admin/courses/{id}/images/{imageId}/delete(id=${course.id}, imageId=${img.id})}" method="post" style="display: inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="delete-btn-small" onclick="return confirm('Удалить изображение?')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                    <form th:if="!${img.main}" th:action="@{/admin/courses/{id}/images/{imageId}/main(id=${course.id}, imageId=${img.id})}" method="post" style="display: inline;">
                        <button type="submit" class="edit-btn-small" title="Сделать главным">
                            <i class="fas fa-star"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <hr>
    <div class="home-link">
        <a th:href="@{/admin/courses}">Вернуться к списку курсов</a>
    </div>
</div>
