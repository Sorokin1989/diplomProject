<div th:fragment="order-detail-content" class="order-detail-container">
    <div class="page-header">
        <h1>Заказ № <span th:text="${order.id}"></span></h1>
        <p>Дата создания: <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></span></p>
    </div>

    <div class="order-status-block">
        <div class="status-label">Статус заказа:</div>
        <div class="order-status" th:classappend="'status-' + ${order.orderStatus}">
            <span th:text="${order.orderStatus}"></span>
        </div>
    </div>

    <!-- Блок для администратора: смена статуса -->
    <div th:if="${isAdmin}" class="admin-status-form">
        <form th:action="@{/orders/{id}/status(id=${order.id})}" method="post" class="status-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <select name="status" class="form-control">
                <option th:each="s : ${availableStatuses}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${s.name() == order.orderStatus}"></option>
            </select>
            <button type="submit" class="btn-primary">Изменить статус</button>
        </form>
    </div>

    <!-- Кнопка отмены заказа для владельца -->
    <div th:if="${!isAdmin and order.orderStatus == 'PENDING'}" class="cancel-order-block">
        <form th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-danger" onclick="return confirm('Отменить заказ?')">Отменить заказ</button>
        </form>
    </div>

    <!-- Состав заказа -->
    <div class="order-items">
        <h3>Состав заказа</h3>
        <table class="order-items-table">
            <thead>
            <tr>
                <th>Курс</th>
                <th>Количество</th>
                <th>Цена</th>
                <th>Сумма</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${order.orderItemDtos}">
                <td th:text="${item.courseTitle}">Название курса</td>
                <td th:text="${item.quantity}">1</td>
                <td th:text="${item.price} + ' ₽'">1000 ₽</td>
                <td th:text="${item.total} + ' ₽'">1000 ₽</td>
            </tr>
            </tbody>
            <tfoot>
            <tr class="total-row">
                <td colspan="3"><strong>Итого:</strong></td>
                <td><strong th:text="${order.totalSum} + ' ₽'"></strong></td>
            </tr>
            <tr th:if="${order.discountAmount != null and order.discountAmount > 0}">
                <td colspan="3">Скидка:</td>
                <td th:text="'-' + ${order.discountAmount} + ' ₽'"></td>
            </tr>
            <tr th:if="${order.promoCode}">
                <td colspan="3">Применён промокод:</td>
                <td th:text="${order.promoCode}"></td>
            </tr>
            </tfoot>
        </table>
    </div>

    <!-- Информация об оплате (если есть) -->
    <div th:if="${order.paymentId}" class="payment-info">
        <h3>Информация об оплате</h3>
        <p><strong>Способ оплаты:</strong> <span th:text="${order.paymentType}"></span></p>
        <p><strong>Статус оплаты:</strong> <span th:text="${order.paymentStatus}"></span></p>
    </div>

    <div class="back-link">
        <a th:href="@{/orders}" class="btn-secondary">← Вернуться к списку заказов</a>
    </div>
</div>
