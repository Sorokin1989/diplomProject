<header th:fragment="_header" class="site-header"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="header-container">
        <div class="logo">
            <a th:href="@{/}">
                <span class="logo-text">Школа красоты</span>
                <span class="logo-sub">учебный центр</span>
            </a>
        </div>

        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">
            <i class="fas fa-bars"></i>
        </label>

        <nav class="main-nav">
            <ul class="nav-list">
                <li><a th:href="@{/}" class="nav-link">Главная</a></li>

                <!-- Каталог (можно сгруппировать) -->
                <li><a th:href="@{/categories}" class="nav-link">Категории</a></li>

                <!-- Моё (выпадающее) -->
                <li class="dropdown" sec:authorize="isAuthenticated() and !hasRole('ADMIN')">
                    <span class="nav-link dropdown-toggle">Кабинет</span>
                    <div class="dropdown-menu">
                        <a th:href="@{/profile}">Профиль</a>
                        <a th:href="@{/certificates}">Сертификаты</a>
                        <a th:href="@{/my-courses}">Курсы</a>
                        <a th:href="@{/orders}">Заказы</a>
                    </div>
                </li>

                <li sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/profile}" class="nav-link">Профиль</a>
                </li>

                <!-- Профиль / Выход (выпадающее) -->
                <li sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="nav-link logout-btn">Выйти</button>
                    </form>
                </li>


                <!-- Админка -->
                <li sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin}" class="nav-link">Админка</a>
                </li>

                <!-- Корзина (всегда видна) -->
                <li sec:authorize="!hasRole('ADMIN')"><a th:href="@{/cart}" class="nav-link"><i class="fas fa-shopping-cart"></i> Корзина</a></li>

                <!-- Вход / Регистрация для анонимов -->
                <li sec:authorize="isAnonymous()"><a th:href="@{/login}" class="nav-link">Вход</a></li>
                <li sec:authorize="isAnonymous()"><a th:href="@{/register}" class="nav-link">Регистрация</a></li>
            </ul>
        </nav>
    </div>
</header>
