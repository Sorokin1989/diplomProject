<div th:fragment="orders-list-content" class="orders-container">
    <div class="page-header">
        <h1 th:text="${isAdmin} ? 'Управление заказами' : 'Мои заказы'">Заказы</h1>
        <p th:if="${isAdmin}">Список всех заказов клиентов</p>
        <p th:unless="${isAdmin}">История ваших покупок</p>
    </div>

    <div class="admin-actions" style="margin-bottom: 1rem; text-align: right;">
        <!-- Кнопка скрыть все мои заказы -->
        <form th:action="@{/orders/hide-mine}" method="post" style="display: inline-block;" onsubmit="return confirm('Скрыть все ваши заказы? Они не будут удалены, но перестанут отображаться.')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-secondary">Скрыть мои заказы</button>
        </form>
        <!-- Кнопка показать скрытые заказы -->
        <form th:action="@{/orders/unhide-mine}" method="post" style="display: inline-block; margin-left: 0.5rem;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-secondary">Показать скрытые заказы</button>
        </form>
    </div>

    <div th:if="${orders == null or orders.isEmpty()}" class="empty-state">
        <i class="fas fa-shopping-bag"></i>
        <p>У вас пока нет заказов</p>
        <a th:href="@{/courses}" class="btn-primary">Перейти к курсам</a>
    </div>

    <div th:unless="${orders == null or orders.isEmpty()}" class="orders-list">
        <div th:each="order : ${orders}" class="order-card">
            <div class="order-header">
                <div class="order-number">
                    <strong>Заказ №</strong> <span th:text="${order.id}"></span>
                </div>
                <div class="order-date">
                    <i class="far fa-calendar-alt"></i>
                    <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                </div>
                <div class="order-status" th:classappend="'status-' + ${order.orderStatus}">
                    <span th:text="${order.orderStatus}"></span>
                </div>
            </div>
            <div class="order-info">
                <div class="order-total">
                    <strong>Сумма:</strong> <span th:text="${order.totalSum} + ' ₽'"></span>
                </div>
                <div th:if="${order.promoCode}" class="order-promo">
                    <strong>Промокод:</strong> <span th:text="${order.promoCode}"></span>
                </div>
            </div>
            <div class="order-actions">
                <a th:href="@{/orders/{id}(id=${order.id})}" class="btn-view-order">Подробнее →</a>
            </div>
        </div>
    </div>
</div>
