<div th:fragment="review-form-content" class="review-form-container">
    <div class="page-header">
        <h1 th:text="${reviewDto.id != null} ? 'Редактирование отзыва' : 'Новый отзыв'">Отзыв</h1>
    </div>
    <form th:action="${reviewDto.id != null}
                     ? @{/courses/{courseId}/reviews/{reviewId}(courseId=${course.id}, reviewId=${reviewDto.id})}
                     : @{/courses/{courseId}/reviews(courseId=${course.id})}"
          method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="input-group">
            <label>Оценка (1-5):</label>
            <select name="rating" class="input-field" required>
                <option value="1" th:selected="${reviewRating == 1}">1 ★</option>
                <option value="2" th:selected="${reviewRating == 2}">2 ★★</option>
                <option value="3" th:selected="${reviewRating == 3}">3 ★★★</option>
                <option value="4" th:selected="${reviewRating == 4}">4 ★★★★</option>
                <option value="5" th:selected="${reviewRating == 5}">5 ★★★★★</option>
            </select>
        </div>
        <div class="input-group">
            <label>Текст отзыва:</label>
            <textarea name="text" class="input-field" rows="4" required th:text="${reviewText}"></textarea>
        </div>
        <button type="submit" class="btn-primary">Сохранить</button>
        <a th:href="@{/courses/{id}(id=${course.id})}" class="btn-secondary">Отмена</a>
    </form>
</div>
