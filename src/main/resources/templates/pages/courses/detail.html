<div th:fragment="detail-content" class="course-detail-container">

    <!-- Блок для flash-сообщений -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div class="course-header">
        <h1 th:text="${course.title}">Название курса</h1>
        <div class="course-rating" th:if="${reviewCount != null and reviewCount > 0}">
            <span>⭐ <span th:text="${reviewCount}">0</span> отзывов</span>
        </div>
    </div>

    <div class="course-detail-image">
        <img th:if="${course.imageUrl != null}" th:src="@{${course.imageUrl}}" alt="course image">
        <i th:unless="${course.imageUrl != null}" class="fas fa-graduation-cap"></i>
    </div>

    <div class="course-info">
        <h2>О курсе</h2>
        <p><strong>Название курса:</strong> <span th:text="${course.title}">Название курса</span></p>
        <p th:text="${course.description}">Описание курса</p>
        <p><strong>Автор:</strong> <span th:text="${course.author}">Автор</span></p>
        <p><strong>Цена:</strong> <span th:text="${course.price != null ? course.price + ' ₽' : 'Бесплатно'}"></span></p>
    </div>

    <div class="course-actions">
        <!-- Кнопка "Добавить в корзину" (только если не куплен) -->
        <form th:action="@{/cart/add/{id}(id=${course.id})}" method="post" th:unless="${purchased}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button  type="submit" class="btn-add-to-cart">
                <i class="fas fa-shopping-cart"></i> В корзину
                </button>
        </form>

        <!-- Кнопки скачивания (только если куплен) -->
        <div th:if="${purchased}" class="purchased-actions">
            <!-- Кнопка "Скачать курс" – только если есть материалы -->
            <a th:if="${hasMaterials}" th:href="@{/courses/{id}/download-materials(id=${course.id})}" class="btn-primary">
                <i class="fas fa-download"></i> Скачать курс
            </a>
            <!-- Кнопка "Скачать сертификат" – только если сертификат выдан -->
            <a th:if="${hasCertificate}" th:href="@{/certificates/download/{courseId}(courseId=${course.id})}" class="btn-secondary">
                <i class="fas fa-certificate"></i> Скачать сертификат
            </a>
            <!-- Сообщение, если ни того, ни другого нет -->
            <span th:unless="${hasMaterials or hasCertificate}" class="text-muted">
        <i class="fas fa-info-circle"></i> Материалы и сертификат будут добавлены позже
    </span>
        </div>

        <a th:href="@{/courses}" class="btn-secondary">← Вернуться к курсам</a>
    </div>

    <!-- Блок с отзывами -->
    <div th:replace="~{pages/reviews/list :: reviews-list-content}"></div>
</div>
