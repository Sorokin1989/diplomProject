<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
</head>
<body>
<h2>Регистрация</h2>

<div th:if="${error}" th:text="${error}" style="color: red"></div>

<form th:action="@{/register}" th:object="${registrationDto}" method="post">
    <div>
        <label>Имя пользователя:</label>
        <input type="text" th:field="*{username}" required/>
        <span th:errors="*{username}" style="color: red"></span>
    </div>
    <div>
        <label>Email:</label>
        <input type="email" th:field="*{email}" required/>
        <span th:errors="*{email}" style="color: red"></span>
    </div>
    <div>
        <label>Пароль:</label>
        <input type="password" th:field="*{password}" required/>
        <span th:errors="*{password}" style="color: red"></span>
    </div>
    <div>
        <label>Подтверждение пароля:</label>
        <input type="password" th:field="*{confirmPassword}" required/>
        <span th:errors="*{confirmPassword}" style="color: red"></span>
    </div>
    <button type="submit">Зарегистрироваться</button>
</form>

<a href="/login">Уже есть аккаунт? Войти</a>
</body>
</html>
