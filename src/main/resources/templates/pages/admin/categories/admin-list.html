<div th:fragment="admin-categories-content" class="categories-card" xmlns:th="http://www.thymeleaf.org">
    <div class="brand">
        <h1>Школа красоты</h1>
        <p>учебный центр индустрии красоты</p>
    </div>

    <div class="form-header">
        <div th:if="${param.success}" class="message-box success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${param.success}">Успешно</span>
        </div>
        <div th:if="${param.error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${param.error}">Ошибка</span>
        </div>
        <h2>Управление категориями</h2>
        <p>Добавляйте, редактируйте и удаляйте категории</p>
    </div>

    <div class="courses-actions-bar">
        <a th:href="@{/admin}" class="btn-secondary">
            <i class="fas fa-arrow-left"></i> Назад
        </a>
        <a th:href="@{/admin/categories/new}" class="btn-primary">
            <i class="fas fa-plus"></i> Добавить категорию
        </a>
    </div>

    <div class="categories-grid">
        <div th:each="category : ${categories}" class="category-card">
            <div class="category-icon">
                <a th:href="@{/admin/courses(categoryId=${category.id})}">
                    <!-- Используем mainImageUrl вместо imageUrl -->
                    <img th:if="${category.mainImageUrl}" th:src="${category.mainImageUrl}" alt="category image">
                    <i th:unless="${category.mainImageUrl}" class="fas fa-folder"></i>
                </a>
            </div>
            <div class="category-info">
                <h3 th:text="${category.title}">Название</h3>
                <p th:text="${category.description != null ? category.description : 'Описание категории'}">
                    Описание
                </p>
                <div class="admin-actions">
                    <a th:href="@{/admin/categories/edit/{id}(id=${category.id})}" class="edit-btn-small">
                        <i class="fas fa-edit"></i> Редактировать
                    </a>
                    <form th:action="@{/admin/categories/delete/{id}(id=${category.id})}" method="post"
                          style="display: inline;"
                          onsubmit="return confirm('Удалить категорию? Все курсы в ней будут перемещены в общую категорию.');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="delete-btn-small">
                            <i class="fas fa-trash-alt"></i> Удалить
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div th:if="${categories == null or categories.isEmpty()}" class="empty-message">
            <i class="fas fa-folder-open"></i>
            <p>Категории не найдены</p>
        </div>
    </div>
</div>
