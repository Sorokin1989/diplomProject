<div th:fragment="admin-orders-content" class="orders-card">
    <div class="brand">
        <h1>Школа красоты</h1>
        <p>учебный центр индустрии красоты</p>
    </div>

    <div class="form-header">
        <div th:if="${param.error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${param.error}">Ошибка</span>
        </div>
        <div th:if="${param.success}" class="message-box success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${param.success}">Успешно</span>
        </div>
        <h2>Управление заказами</h2>
        <p>Просмотр и изменение статусов заказов</p>
    </div>

    <div class="admin-actions-bar">
        <a th:href="@{/admin}" class="btn-secondary">
            <i class="fas fa-arrow-left"></i> Назад
        </a>
    </div>

    <div class="orders-table-container">
        <table class="orders-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Клиент</th>
                <th>Курс</th>
                <th>Сумма</th>
                <th>Дата заказа</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">1</td>
                <td th:text="${order.user.username}">Иван Иванов</td>
                <td th:text="${order.course.title}">Курс по маникюру</td>
                <td th:text="${order.totalPrice} + ' ₽'">5000 ₽</td>
                <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">01.01.2025 12:00</td>
                <td>
                        <span th:class="'status-badge ' + ${order.status.name().toLowerCase()}" th:text="${order.status.displayName}">
                            Новый
                        </span>
                </td>
                <td>
                    <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="status-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <select name="status" class="status-select" onchange="this.form.submit()">
                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:text="${status.displayName}"
                                    th:selected="${order.status == status}">
                            </option>
                        </select>
                    </form>
                </td>
            </tr>
            <tr th:if="${orders == null or orders.isEmpty()}">
                <td colspan="7" class="empty-message">Заказов не найдено</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
