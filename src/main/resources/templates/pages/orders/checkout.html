<div th:fragment="checkout-content" class="checkout-container">
    <div class="page-header">
        <h1>Оформление заказа</h1>
        <p>Подтверждение покупки</p>
    </div>

    <div th:if="${cartItems == null or cartItems.isEmpty()}" class="empty-cart">
        <i class="fas fa-shopping-cart"></i>
        <p>Корзина пуста</p>
        <a th:href="@{/courses}" class="btn-primary">Перейти к курсам</a>
    </div>

    <div th:unless="${cartItems == null or cartItems.isEmpty()}" class="checkout-content">
        <div class="cart-items">
            <div class="cart-item" th:each="item : ${cartItems}">
                <div class="item-details">
                    <h3 th:text="${item.courseTitle}"></h3>
                    <div class="item-price" th:text="${item.price} + ' ₽'"></div>
                    <!-- Строка с количеством удалена -->
                </div>
            </div>
        </div>

        <div class="cart-summary">
            <div class="summary-row">
                <span>Итого:</span>
                <span th:text="${newTotal != null ? newTotal + ' ₽' : totalPrice + ' ₽'}"></span>
            </div>

            <form th:action="@{/orders/apply-promocode}" method="post" class="promocode-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="promocode-input">
                    <input type="text" name="promocode" placeholder="Промокод">
                    <button type="submit" class="btn-secondary">Применить</button>
                </div>
                <div th:if="${promocodeError}" class="error-message" th:text="${promocodeError}"></div>
                <div th:if="${promocodeApplied}" class="success-message">
                    Скидка применена! Итого: <strong  th:text="${newTotal != null ? newTotal : totalPrice} + ' ₽'"></strong>
                </div>
            </form>

            <form th:action="@{/orders/checkout/process}" method="post">
                <input type="hidden" name="promocode" th:value="${appliedPromocode}" />
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-primary checkout-btn">Оформить заказ</button>
            </form>
            <a href="/cart" class="btn-secondary btn-back-to-cart">Вернуться в корзину</a>
        </div>
    </div>
</div>
