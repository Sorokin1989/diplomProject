<div th:fragment="user-courses-content" class="courses-container" xmlns:th="http://www.thymeleaf.org">
    <div class="courses-header">
        <h2>Наши курсы</h2>
        <p th:if="${category != null}" th:text="${category.title}">Категория</p>
        <p th:unless="${category != null}">Выберите курс для обучения</p>
    </div>

    <div class="courses-grid">
        <div th:each="course : ${courses}" class="course-card">
            <div class="course-image">
                <img th:if="${course.imageUrl}" th:src="${course.imageUrl}" alt="course image" style="width:100%; height:150px; object-fit:cover;">
                <i th:unless="${course.imageUrl}" class="fas fa-graduation-cap" style="font-size: 3rem;"></i>
            </div>
            <div class="course-info">
                <h3 th:text="${course.title}">Название курса</h3>
                <p th:text="${course.description != null ? course.description : 'Описание курса'}">Описание</p>
                <div class="course-meta">
                    <span class="course-price" th:text="${#numbers.formatDecimal(course.price, 0, 2, 'COMMA', ' ')} + ' ₽'">
                        0 ₽
                    </span>
                    <span class="course-duration" th:if="${course.duration}">
                        <i class="fas fa-clock"></i> <span th:text="${course.duration}">0</span> ч.
                    </span>
                </div>
                <div class="course-actions">
                    <a th:href="@{/courses/{id}(id=${course.id})}" class="btn-course">Подробнее</a>
                    <button th:if="${#authorization.expression('isAuthenticated()')}"
                            class="btn-add-to-cart" th:data-id="${course.id}">
                        <i class="fas fa-shopping-cart"></i> В корзину
                    </button>
                </div>
            </div>
        </div>
        <div th:if="${courses == null or courses.isEmpty()}" class="empty-courses">
            <i class="fas fa-folder-open"></i>
            <p>Курсы не найдены</p>
        </div>
    </div>

    <hr>
    <div class="home-link">
        <a th:href="@{/categories}">Все категории</a>
    </div>
</div>
