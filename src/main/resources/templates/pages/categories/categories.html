<div th:fragment="categories-content" class="categories-card">
    <div class="brand">
        <h1>Категории курсов</h1>
        <p>Выберите направление для обучения</p>
    </div>
    <div class="form-header">
        <h2>Наши направления</h2>
        <p>Широкий выбор программ для любого уровня подготовки</p>
    </div>
    <div class="categories-grid">
        <a th:href="@{/courses(categoryId=${category.id})}" class="category-link" th:each="category : ${categories}">
            <div class="category-card">
                <div class="category-icon-user">
                    <img th:if="${category.imageUrl != null}"
                         th:src="@{${category.imageUrl}}"
                         alt="Category image">
                    <i th:unless="${category.imageUrl != null}" class="fas fa-folder"></i>
                </div>
                <div class="category-info">
                    <h3 th:text="${category.title}">Название</h3>
                    <p th:text="${category.description != null ? category.description : 'Описание категории'}">Описание</p>
                </div>
            </div>
        </a>
        <div th:if="${categories == null or categories.isEmpty()}" class="empty-categories">
            <i class="fas fa-folder-open"></i>
            <p>Категории не найдены</p>
        </div>
    </div>
</div>
