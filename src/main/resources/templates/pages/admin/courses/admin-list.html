<div th:fragment="admin-courses-content" class="categories-card" xmlns:th="http://www.thymeleaf.org">
    <div class="brand">
        <h1>Школа красоты</h1>
        <p>учебный центр индустрии красоты</p>
    </div>

    <div class="form-header">
        <div th:if="${param.success}" class="message-box success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${param.success}">Успешно</span>
        </div>
        <div th:if="${param.error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${param.error}">Ошибка</span>
        </div>
        <h2>Управление курсами</h2>
        <p>Добавляйте, редактируйте и удаляйте курсы</p>
    </div>

    <div class="courses-actions-bar">
        <a th:href="@{/admin}" class="btn-secondary">
            <i class="fas fa-arrow-left"></i> Назад
        </a>
        <a th:href="@{/admin/courses/new}" class="btn-primary">
            <i class="fas fa-plus"></i> Добавить курс
        </a>
    </div>

    <div class="categories-grid">
        <div th:each="course : ${courses}" class="category-card">
            <div class="category-icon">
                <!-- Используем mainImageUrl вместо imageUrl -->
                <img th:if="${course.mainImageUrl}" th:src="${course.mainImageUrl}" alt="course image">
                <i th:unless="${course.mainImageUrl}" class="fas fa-graduation-cap"></i>
            </div>
            <div class="category-info">
                <h3 th:text="${course.title}">Название курса</h3>
                <p th:text="${course.description != null ? course.description : 'Описание курса'}">Описание</p>
                <div class="category-meta">
                    <span class="courses-count">
                        <i class="fas fa-ruble-sign"></i>
                        <span th:text="${course.price != null ? course.price : 0}">0</span> ₽
                    </span>
                </div>
                <div class="admin-actions">
                    <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="edit-btn-small">
                        <i class="fas fa-edit"></i> Редактировать
                    </a>
                    <form th:action="@{/admin/courses/delete/{id}(id=${course.id})}" method="post"
                          style="display: inline;"
                          onsubmit="return confirm('Удалить курс?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="delete-btn-small">
                            <i class="fas fa-trash-alt"></i> Удалить
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div th:if="${courses == null or courses.isEmpty()}" class="empty-courses">
            <i class="fas fa-folder-open"></i>
            <p>Курсы не найдены</p>
        </div>
    </div>
</div>
