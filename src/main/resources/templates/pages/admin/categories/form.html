<div th:fragment="category-form" class="categories-card" xmlns:th="http://www.thymeleaf.org">
    <div class="brand">
        <h1>Школа красоты</h1>
        <p>учебный центр индустрии красоты</p>
    </div>

    <div class="form-header">
        <div th:if="${param.error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${param.error}">Ошибка</span>
        </div>
        <div th:if="${param.success}" class="message-box success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${param.success}">Успешно</span>
        </div>
        <h2 th:text="${category.id != null ? 'Редактирование категории' : 'Создание категории'}">Форма категории</h2>
        <p>Заполните данные категории</p>
    </div>

    <form th:action="@{${category.id != null ? '/admin/categories/' + category.id : '/admin/categories'}}"
          method="post" th:object="${category}" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="input-group">
            <label for="title">Название категории *</label>
            <div class="input-field">
                <i class="fas fa-tag"></i>
                <input type="text" id="title" th:field="*{title}" placeholder="Например: Маникюр" required>
            </div>
        </div>

        <div class="input-group">
            <label for="description">Описание</label>
            <div class="input-field">
                <i class="fas fa-align-left"></i>
                <textarea id="description" th:field="*{description}" rows="4"
                          placeholder="Краткое описание категории"></textarea>
            </div>
        </div>



        <!-- Поле для загрузки новых изображений (можно несколько) -->
        <div class="input-group">
            <label for="newImages">Добавить новые изображения</label>
            <div class="input-field">
                <i class="fas fa-image"></i>
                <input type="file" id="newImages" name="newImages" accept="image/*" multiple>
            </div>
            <small class="image-hint">Вы можете выбрать несколько файлов (jpg, png, gif).</small>
        </div>

        <button type="submit" class="save-btn">
            <i class="fas fa-save"></i> Сохранить категорию
        </button>
    </form>

    <!-- Блок существующих изображений (только при редактировании) -->
    <div th:if="${category.id != null and not #lists.isEmpty(category.images)}" class="input-group">
        <label>Изображения категории</label>
        <div class="existing-images" style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem;">
            <div th:each="img : ${category.images}" class="image-item" style="position: relative; width: 100px;">
                <img th:src="${img.filePath}" style="width: 100%; height: 100px; object-fit: cover; border-radius: 8px;">
                <span th:if="${img.main}" style="position: absolute; top: 0; right: 0; background: gold; color: black; font-size: 10px; padding: 2px 5px; border-radius: 4px;">Главное</span>
                <div class="image-actions" style="margin-top: 5px; display: flex; gap: 5px; justify-content: center;">
                    <form th:action="@{/admin/categories/{id}/images/{imageId}/delete(id=${category.id}, imageId=${img.id})}" method="post" style="display: inline;">
                        <button type="submit" class="delete-btn-small" onclick="return confirm('Удалить изображение?')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                    <form th:if="!${img.main}" th:action="@{/admin/categories/{id}/images/{imageId}/main(id=${category.id}, imageId=${img.id})}" method="post" style="display: inline;">
                        <button type="submit" class="edit-btn-small" title="Сделать главным">
                            <i class="fas fa-star"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <hr>
    <div class="home-link">
        <a th:href="@{/admin/categories}">Вернуться к списку категорий</a>
    </div>
</div>
