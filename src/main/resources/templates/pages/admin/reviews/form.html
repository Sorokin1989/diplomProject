<div th:fragment="admin-review-form-content" class="categories-card">
    <div class="brand">
        <h1>Школа красоты</h1>
        <p>учебный центр индустрии красоты</p>
    </div>

    <div class="form-header">
        <div th:if="${param.error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${param.error}">Ошибка</span>
        </div>
        <h2>Редактирование отзыва</h2>
        <p>Измените текст или рейтинг отзыва</p>
    </div>

    <div class="admin-actions-bar">
        <a th:href="@{/admin/reviews/{id}(id=${review.id})}" class="btn-secondary">
            <i class="fas fa-arrow-left"></i> Назад к просмотру
        </a>
    </div>

    <form th:action="@{/admin/reviews/{id}/edit(id=${review.id})}" method="post" class="admin-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="input-group">
            <label for="text">Текст отзыва:</label>
            <div class="input-field">
                <i class="fas fa-comment"></i>
                <textarea id="text" name="text" rows="6" required th:text="${review.text}"></textarea>
            </div>
        </div>

        <div class="input-group">
            <label for="rating">Рейтинг (1–5):</label>
            <div class="input-field">
                <i class="fas fa-star"></i>
                <select id="rating" name="rating" required>
                    <option value="1" th:selected="${review.rating == 1}">1 – Ужасно</option>
                    <option value="2" th:selected="${review.rating == 2}">2 – Плохо</option>
                    <option value="3" th:selected="${review.rating == 3}">3 – Нормально</option>
                    <option value="4" th:selected="${review.rating == 4}">4 – Хорошо</option>
                    <option value="5" th:selected="${review.rating == 5}">5 – Отлично</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">
                <i class="fas fa-save"></i> Сохранить
            </button>
            <a th:href="@{/admin/reviews/{id}(id=${review.id})}" class="btn-secondary">Отмена</a>
        </div>
    </form>
</div>
