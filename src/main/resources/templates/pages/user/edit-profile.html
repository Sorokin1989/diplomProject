<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="edit-profile-content" class="edit-profile-container">
    <div class="edit-profile-card">
        <div class="brand">
            <h1>Виктория</h1>
            <p>учебный центр индустрии красоты</p>
        </div>

        <div class="form-header">
            <h2>Редактирование профиля</h2>
            <p>Измените свои данные</p>
        </div>

        <!-- Сообщение об ошибке (если есть) -->
        <div th:if="${error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${error}">Ошибка</span>
        </div>

        <form th:action="@{/profile/edit}" th:object="${user}" method="post">
            <div class="input-group">
                <label for="username">Имя пользователя</label>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" th:field="*{username}" placeholder="Введите имя пользователя" required>
                </div>
                <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error"></span>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" th:field="*{email}" placeholder="Введите email" required>
                </div>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></span>
            </div>

            <!-- При желании можно добавить поля для смены пароля, но пока их нет в UserDto -->
            <!--
            <div class="input-group">
                <label for="password">Новый пароль</label>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Оставьте пустым, если не меняете">
                </div>
            </div>
            -->

            <button type="submit" class="save-btn">
                <i class="fas fa-save"></i> Сохранить изменения
            </button>
        </form>

        <hr>
        <div class="profile-link">
            <a th:href="@{/profile}">Вернуться в профиль</a>
        </div>
    </div>
</div>
</html>
