<div th:fragment="category-form" class="categories-card" xmlns:th="http://www.thymeleaf.org">
    <div class="brand">
        <h1>Школа красоты</h1>
        <p>учебный центр индустрии красоты</p>
    </div>

    <div class="form-header">
        <!-- Сообщения об ошибках и успехе -->
        <div th:if="${param.error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${param.error}">Ошибка</span>
        </div>
        <div th:if="${param.success}" class="message-box success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${param.success}">Успешно</span>
        </div>
        <h2 th:text="${category.id != null ? 'Редактирование категории' : 'Создание категории'}">Форма категории</h2>
        <p>Заполните данные категории</p>
    </div>

    <form th:action="@{${category.id != null ? '/admin/categories/' + category.id : '/admin/categories'}}"
          method="post" th:object="${category}" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="input-group">
            <label for="title">Название категории *</label>
            <div class="input-field">
                <i class="fas fa-tag"></i>
                <input type="text" id="title" th:field="*{title}" placeholder="Например: Маникюр" required>
            </div>
        </div>

        <div class="input-group">
            <label for="description">Описание</label>
            <div class="input-field">
                <i class="fas fa-align-left"></i>
                <textarea id="description" th:field="*{description}" rows="4"
                          placeholder="Краткое описание категории"></textarea>
            </div>
        </div>

        <div class="input-group">
            <label for="imageFile">Изображение категории</label>
            <div class="input-field">
                <i class="fas fa-image"></i>
                <input type="file" id="imageFile" name="imageFile" accept="image/*">
            </div>
            <small style="color: #6b5b7e; margin-top: 0.25rem; display: block;">
                <i class="fas fa-info-circle"></i> Загрузите изображение (необязательно)
            </small>
            <div th:if="${category.imageUrl}" class="current-image" style="margin-top: 0.5rem;">
                <img th:src="${category.imageUrl}" alt="current image" style="max-width: 100px; border-radius: 0.5rem;">
            </div>
        </div>

        <button type="submit" class="save-btn">
            <i class="fas fa-save"></i> Сохранить категорию
        </button>
    </form>

    <hr>
    <div class="home-link">
        <a th:href="@{/admin/categories}">Вернуться к списку категорий</a>
    </div>
</div>
