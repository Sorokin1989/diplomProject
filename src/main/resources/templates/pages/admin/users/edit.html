<div th:fragment="admin-user-edit-content" class="categories-card" xmlns:th="http://www.thymeleaf.org">
    <div class="brand">
        <h1>Школа красоты</h1>
        <p>учебный центр индустрии красоты</p>
    </div>

    <div class="form-header">
        <div th:if="${param.success}" class="message-box success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${param.success}">Успешно</span>
        </div>
        <div th:if="${param.error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${param.error}">Ошибка</span>
        </div>
        <h2>Редактирование пользователя</h2>
        <p>Измените данные профиля</p>
    </div>

    <form th:action="@{/admin/users/{id}(id=${user.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="input-group">
            <label for="username">Имя пользователя</label>
            <div class="input-field">
                <i class="fas fa-user"></i>
                <input type="text" id="username" name="username" th:value="${user.username}" required>
            </div>
        </div>

        <div class="input-group">
            <label for="email">Email</label>
            <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" name="email" th:value="${user.email}" required>
            </div>
        </div>

        <div class="input-group">
            <label for="role">Роль</label>
            <div class="input-field">
                <i class="fas fa-shield-alt"></i>
                <select id="role" name="role">
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"
                            th:selected="${r.name() == user.role}"></option>
                </select>
            </div>
        </div>

        <button type="submit" class="save-btn">
            <i class="fas fa-save"></i> Сохранить изменения
        </button>
    </form>

    <hr>
    <div class="home-link">
        <a th:href="@{/admin/users}">Вернуться к списку пользователей</a>
    </div>
</div>
