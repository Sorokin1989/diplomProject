<div th:fragment="discount-form" class="categories-card" xmlns:th="http://www.thymeleaf.org">
    <div class="brand">
        <h1>Школа красоты</h1>
        <p>учебный центр индустрии красоты</p>
    </div>

    <div class="form-header">
        <div th:if="${param.error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${param.error}">Ошибка</span>
        </div>
        <div th:if="${param.success}" class="message-box success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${param.success}">Успешно</span>
        </div>
        <h2 th:text="${discount.id != null ? 'Редактирование скидки' : 'Создание скидки'}">Форма скидки</h2>
        <p>Заполните данные скидки</p>
    </div>

    <form th:action="@{${discount.id != null ? '/admin/discounts/' + discount.id : '/admin/discounts'}}"
          method="post" th:object="${discount}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="input-group">
            <label for="title">Название скидки *</label>
            <div class="input-field">
                <i class="fas fa-tag"></i>
                <input type="text" id="title" th:field="*{title}" placeholder="Например: Летняя распродажа" required>
            </div>
        </div>

        <div class="input-group">
            <label for="description">Описание</label>
            <div class="input-field">
                <i class="fas fa-align-left"></i>
                <textarea id="description" th:field="*{description}" rows="3"
                          placeholder="Описание скидки"></textarea>
            </div>
        </div>
        <div class="input-group">
            <label for="discountType">Тип скидки *</label>
            <div class="input-field">
                <i class="fas fa-tag"></i>
                <select id="discountType" th:field="*{discountType}" required>
                    <option th:each="type : ${discountTypes}" th:value="${type}" th:text="${type.name()}"></option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label for="discountValue" id="valueLabel">Скидка *</label>
            <div class="input-field">
                <i id="valueIcon" class="fas" th:classappend="${discount.discountType?.name() == 'FIXED' ? 'fa-ruble-sign' : 'fa-percent'}"></i>
                <input type="number" id="discountValue" th:field="*{discountValue}" step="0.01" required>
            </div>
        </div>

        <div class="input-group">
            <label for="minOrderAmount">Минимальная сумма заказа (руб.)</label>
            <div class="input-field">
                <i class="fas fa-shopping-cart"></i>
                <input type="number" id="minOrderAmount" th:field="*{minOrderAmount}" step="0.01" placeholder="0">
            </div>
        </div>

        <div class="input-group">
            <label for="startDate">Дата начала</label>
            <div class="input-field">
                <i class="fas fa-calendar-alt"></i>
                <input type="datetime-local" id="startDate" th:field="*{startDate}">
            </div>
        </div>

        <div class="input-group">
            <label for="endDate">Дата окончания</label>
            <div class="input-field">
                <i class="fas fa-calendar-check"></i>
                <input type="datetime-local" id="endDate" th:field="*{endDate}">
            </div>
        </div>

        <div class="input-group">
            <label class="checkbox-label">
                <input type="checkbox" th:field="*{active}" />
                <span>Активна</span>
            </label>
        </div>

        <button type="submit" class="save-btn">
            <i class="fas fa-save"></i> Сохранить скидку
        </button>
    </form>

    <hr>
    <div class="home-link">
        <a th:href="@{/admin/discounts}">Вернуться к списку скидок</a>
    </div>
</div>
