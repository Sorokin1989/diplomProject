<div th:fragment="reviews-list-content" class="reviews-section">
    <div class="reviews-header" style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Отзывы
            <span th:if="${averageRating != null}">
                (<span th:text="${averageRating}">0</span>/5)
            </span>
        </h3>
        <!-- Кнопка "Написать отзыв" – показывается только если пользователь может оставить отзыв -->
        <a th:if="${canReview}"
           th:href="@{/courses/{courseId}/reviews/new(courseId=${course.id})}"
           class="btn-primary btn-sm">
            <i class="fas fa-pen"></i> Написать отзыв
        </a>
    </div>

    <!-- Нет отзывов -->
    <div th:if="${reviews.isEmpty()}" class="empty-reviews">
        <p>😊 Пока нет отзывов. Будьте первым!</p>
    </div>

    <!-- Список отзывов -->
    <div th:unless="${reviews.isEmpty()}" class="reviews-list">
        <div th:each="review : ${reviews}" class="review-card">
            <div class="review-header">
                <span class="review-author" th:text="${review.username}">Пользователь</span>
                <div class="review-rating">
                    <span th:each="i : ${#numbers.sequence(1, 5)}"
                          th:text="${i <= review.rating} ? '★' : '☆'"></span>
                </div>
                <span class="review-date" th:text="${#temporals.format(review.createdAt, 'dd.MM.yyyy')}"></span>
            </div>
            <p class="review-text" th:text="${review.text}">Текст отзыва</p>
            <!-- Статус модерации (опционально) -->
            <div th:if="${review.moderationStatus == 'PENDING'}" class="moderation-pending">
                ⏳ На модерации
            </div>
            <div th:if="${review.moderationStatus == 'REJECTED'}" class="moderation-rejected">
                ⚠️ Отзыв отклонён
            </div>
        </div>
    </div>
</div>
