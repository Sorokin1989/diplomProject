<div th:fragment="contacts-content" class="contacts-container">
    <div th:if="${success != null}" class="alert alert-success alert-permanent">
        Спасибо! Ваше сообщение отправлено. Мы свяжемся с вами в ближайшее время.
    </div>
    <!-- Сообщение об ошибке -->
    <div th:if="${error}" class="alert alert-danger alert-permanent">
        <span th:text="${error}">Произошла ошибка при отправке.</span>
    </div>
    <h1>Связаться с нами</h1>
    <div class="contacts-wrapper">
        <!-- Левый блок: контактная информация -->
        <div class="contact-info-block">
            <!-- Рисунок как на главной странице (иконка spa) -->
            <div class="contact-hero-icon">
                <i class="fas fa-spa"></i>
            </div>

            <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                    <h3>Email</h3>
                    <p>111menedger000@mail.ru</p>
                </div>
            </div>

            <div class="social-links">
                <a href="https://vk.com/visage_studio_rus"
                   target="_blank"
                   rel="noopener noreferrer"
                   aria-label="VK"><i class="fab fa-vk"></i></a>

                <a href="https://max.ru/join/84NMj53hp828V1n_eCDIFTT-9xPCvPbsWwVT_Wr-Csw"
                   target="_blank"
                   rel="noopener noreferrer"
                    aria-label="Max">
                    <img src="/max.webp" alt="MAX" class="max-btn">
                </a>


            </div>
        </div>

        <!-- Правый блок: форма обратной связи -->
        <div class="contact-form-block">
            <h2>Напишите нам</h2>
            <form th:action="@{/send-message}" method="post" class="contact-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="text" name="name" placeholder="Ваше имя" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="text" name="phone" placeholder="Телефон (необязательно)">
                <textarea name="message" rows="5" placeholder="Ваше сообщение" required></textarea>
                <button type="submit" class="btn-primary">Отправить сообщение</button>
            </form>
        </div>
    </div>
</div>
