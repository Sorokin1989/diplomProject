<div th:fragment="register-content" class="register-container" xmlns:th="http://www.thymeleaf.org">
    <div class="register-card">
        <div class="brand">
            <h1>Школа красоты</h1>
            <p>учебный центр индустрии красоты</p>
        </div>

        <div class="form-header">
            <h2>Создайте аккаунт</h2>
            <p>Присоединяйтесь к нашему учебному центру</p>
        </div>

        <div th:if="${error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${error}">Ошибка</span>
        </div>

        <form th:action="@{/register}" th:object="${registrationDto}" method="post">
            <div class="input-group">
                <label for="username">Имя пользователя</label>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" th:field="*{username}" placeholder="Введите имя пользователя" required>
                </div>
                <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error"></span>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" th:field="*{email}" placeholder="Введите email" required>
                </div>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></span>
            </div>

            <div class="input-group">
                <label for="password">Пароль</label>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" th:field="*{password}" placeholder="Придумайте пароль" required>
                </div>
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></span>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Подтверждение пароля</label>
                <div class="input-field">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Повторите пароль" required>
                </div>
                <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="field-error"></span>
            </div>

            <button type="submit" class="register-btn">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>
        </form>

        <hr>
        <div class="login-link">
            Уже есть аккаунт? <a th:href="@{/login}">Войти</a>
        </div>
    </div>
</div>
