<header th:fragment="_header" class="site-header"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="header-container">
        <div class="logo">
            <a th:href="@{/}">
                <span class="logo-text">Школа красоты</span>
                <span class="logo-sub">учебный центр</span>
            </a>
        </div>

        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">
            <i class="fas fa-bars"></i>
        </label>

        <nav class="main-nav">
            <ul class="nav-list">
                <li><a th:href="@{/}" class="nav-link">Главная</a></li>
                <li><a th:href="@{/categories}" class="nav-link">Категории</a></li> <!-- новая вкладка -->
                <!-- Блок для анонимного пользователя -->
                <li sec:authorize="isAnonymous()">
                    <a th:href="@{/register}" class="nav-link">Регистрация</a>
                </li>
                <li sec:authorize="isAnonymous()">
                    <a th:href="@{/login}" class="nav-link">Вход</a>
                </li>
                <!-- Блок для аутентифицированного пользователя -->
                <li sec:authorize="isAuthenticated()">
                    <a th:href="@{/profile}" class="nav-link">Мой профиль</a>
                </li>
                <li sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin/users}" class="nav-link">Админка</a>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="nav-link logout-btn">Выйти</button>
                    </form>
                </li>
                <li><a th:href="@{/cart}" class="nav-link"><i class="fas fa-shopping-cart"></i> Корзина</a></li>
            </ul>
        </nav>
    </div>
</header>
