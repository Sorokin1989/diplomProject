<div th:fragment="certificates-list-content" class="certificates-container">
    <div class="page-header">
        <h1>Мои сертификаты</h1>
        <p>Все выданные вам сертификаты об окончании курсов</p>
    </div>

    <div th:if="${certificates == null or certificates.isEmpty()}" class="empty-state">
        <i class="fas fa-certificate"></i>
        <p>У вас пока нет сертификатов</p>
        <a th:href="@{/courses}" class="btn-primary">Перейти к курсам</a>
    </div>

    <div th:unless="${certificates == null or certificates.isEmpty()}" class="certificates-grid">
        <div th:each="cert : ${certificates}" class="certificate-card">
            <div class="certificate-icon">
                <i class="fas fa-award"></i>
            </div>
            <div class="certificate-info">
                <h3 th:text="${cert.courseTitle}">Название курса</h3>
                <p class="certificate-id">Номер: <span th:text="${cert.certificateId}">CERT-123</span></p>
                <p class="certificate-date">Выдан: <span th:text="${#temporals.format(cert.createdAt, 'dd.MM.yyyy')}">01.01.2024</span></p>
                <p th:if="${cert.revoked}" class="revoked-badge">Отозван</p>
                <a th:href="@{/certificates/{id}(id=${cert.id})}" class="btn-view">Подробнее →</a>
            </div>
        </div>
    </div>
</div>
