<div th:fragment="admin-certificate-view" class="categories-card">
    <div class="brand">
        <h1>Школа красоты</h1>
        <p>учебный центр индустрии красоты</p>
    </div>

    <div class="form-header">
        <div th:if="${param.error}" class="message-box error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${param.error}">Ошибка</span>
        </div>
        <div th:if="${param.success}" class="message-box success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${param.success}">Успешно</span>
        </div>
        <h2>Сертификат #<span th:text="${certificate.id}"></span></h2>
        <p>Детальная информация</p>
    </div>

    <div class="certificate-details">
        <div class="detail-row">
            <strong>Пользователь:</strong> <span th:text="${certificate.user.username}"></span>
        </div>
        <div class="detail-row">
            <strong>Email пользователя:</strong> <span th:text="${certificate.user.email}"></span>
        </div>
        <div class="detail-row">
            <strong>Курс:</strong> <span th:text="${certificate.course.title}"></span>
        </div>
        <div class="detail-row">
            <strong>Номер сертификата:</strong> <span th:text="${certificate.certificateId}"></span>
        </div>
        <div class="detail-row">
            <strong>Дата выдачи:</strong> <span th:text="${#temporals.format(certificate.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
        </div>
        <div class="detail-row">
            <strong>Статус:</strong>
            <span th:class="'status-badge ' + (${certificate.revoked} ? 'revoked' : 'active')"
                  th:text="${certificate.revoked} ? 'Отозван' : 'Активен'"></span>
        </div>
        <div th:if="${certificate.revoked}">
            <div class="detail-row">
                <strong>Дата отзыва:</strong> <span th:text="${#temporals.format(certificate.revokedDate, 'dd.MM.yyyy HH:mm')}"></span>
            </div>
        </div>
        <div th:if="${certificate.certificateUrl}">
            <div class="detail-row">
                <strong>Файл:</strong>
                <a th:href="${certificate.certificateUrl}" target="_blank" class="download-link">
                    <i class="fas fa-download"></i> Скачать сертификат
                </a>
            </div>
        </div>
    </div>

    <div class="admin-actions-bar" style="margin-top: 1.5rem;">
        <a th:href="@{/admin/certificates}" class="btn-secondary">
            <i class="fas fa-arrow-left"></i> К списку
        </a>
        <form th:if="!${certificate.revoked}" th:action="@{/admin/certificates/{id}/revoke(id=${certificate.id})}" method="post"
              style="display: inline;"
              onsubmit="return confirm('Отозвать сертификат?');">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-danger">
                <i class="fas fa-ban"></i> Отозвать
            </button>
        </form>
    </div>
</div>
